<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Machine - INDHAN AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/machines.css') }}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .edit-container {
            max-width: 600px;
            margin: 40px auto;
        }
        .btn-cancel {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            padding: 0 24px;
            border-radius: 8px;
            background: #e2e8f0;
            color: #1e293b;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.15s ease;
            margin-right: 12px;
            border: 1px solid var(--border-color);
        }
        .btn-cancel:hover {
            background: #cbd5e1;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 32px;
        }
        .error-banner {
            background: var(--color-critical-bg);
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid #fee2e2;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-industry"></i>
            <div>
                <h2>INDHAN AI</h2>
                <span>Industrial Predictive Maintenance</span>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/history">History</a></li>
            <li><a href="/machines">Machines</a></li>
        </ul>
    </nav>

    <div class="edit-container">
        <div class="card">
            <h2>
                <i class="fas fa-edit"></i>
                Edit Machine Details
            </h2>

            {% if error %}
            <div class="error-banner">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Machine Code</label>
                    <input type="text"
                        name="machine_code"
                        value="{{ machine[1] }}"
                        placeholder="MC001"
                        required>
                </div>

                <div class="form-group">
                    <label>Machine Name</label>
                    <input type="text"
                           name="machine_name"
                           value="{{ machine[2] }}"
                           placeholder="Hydraulic Press"
                           required>
                </div>

                <div class="form-group">
                    <label>Machine Type</label>
                    <select name="machine_type" id="machine_type" required>
                        <option value="L" {% if machine[3] == 'L' %}selected{% endif %}>Low (L)</option>
                        <option value="M" {% if machine[3] == 'M' %}selected{% endif %}>Medium (M)</option>
                        <option value="H" {% if machine[3] == 'H' %}selected{% endif %}>High (H)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text"
                           name="department"
                           value="{{ machine[4] }}"
                           placeholder="Production / Assembly"
                           required>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text"
                           name="location"
                           value="{{ machine[5] }}"
                           placeholder="Plant A / Plant B"
                           required>
                </div>

                <div class="form-group">
                    <label>Installation Date</label>
                    <input type="date"
                           name="installation_date"
                           value="{{ machine[6] }}">
                </div>

                <div class="form-actions">
                    <a href="/machines" class="btn-cancel">
                        <i class="fas fa-times" style="margin-right: 8px;"></i> Cancel
                    </a>
                    <button type="submit" class="btn-save" style="width: auto; padding: 0 32px;">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>

</body>

</html>
