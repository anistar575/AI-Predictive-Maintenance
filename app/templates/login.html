<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - INDHAN AI</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
          
    <style>
        body {
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-blue), #60a5fa);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-header i {
            font-size: 40px;
            color: var(--primary-blue);
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .brand-header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin: 0;
            color: #fff;
        }

        .brand-header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 15px;
            transition: color 0.2s ease;
        }

        .input-icon-wrapper input {
            width: 100%;
            height: 46px;
            background-color: var(--bg-main);
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            padding: 0 16px 0 46px;
            font-size: 14px;
            color: #fff;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .input-icon-wrapper input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.15);
        }

        .input-icon-wrapper input:focus + i {
            color: var(--primary-blue);
        }

        .btn-login {
            width: 100%;
            height: 48px;
            background: linear-gradient(90deg, var(--primary-blue), #2563eb);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 32px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
        }

        .error-banner {
            background: var(--color-critical-bg);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 13px;
            border: 1px solid rgba(239, 68, 68, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .credentials-tip {
            margin-top: 32px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .credentials-tip h3 {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-primary);
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>

<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="brand-header">
            <i class="fas fa-industry"></i>
            <h1>INDHAN AI</h1>
            <p>Predictive Maintenance Platform</p>
        </div>

        {% if error %}
        <div class="error-banner">
            <i class="fas fa-exclamation-circle"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <div class="input-icon-wrapper">
                    <input type="text" name="username" placeholder="Enter username..." required autofocus>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-icon-wrapper">
                    <input type="password" name="password" placeholder="Enter password..." required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="credentials-tip">
            <h3><i class="fas fa-key" style="color: var(--primary-blue);"></i> Default System Credentials</h3>
            <div style="display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; line-height: 1.5;">
                <span style="font-weight: 600;">Admin:</span>
                <code>admin / adminpassword</code>
                <span style="font-weight: 600;">Operator:</span>
                <code>operator / operatorpassword</code>
            </div>
        </div>
    </div>
</div>

</body>

</html>
